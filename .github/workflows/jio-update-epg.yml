name: JioTV EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: vgit-push/jio
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-src

      - name: Mask Proxy
        run: echo "::add-mask::${{ secrets.JIOTV_PROXY }}"

      - name: Install Dependencies
        run: pip install requests

      - name: Generate EPG
        env:
          JIOTV_PROXY: ${{ secrets.JIOTV_PROXY }}
        run: |
          python3 private-src/jiotv_epg.py \
            --days 5 \
            --output epg/jiotv_epg.xml \
            --gzip \
            --workers 8

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p epg
          git add epg/
          git diff --cached --quiet && exit 0
          git commit -m "EPG Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
